# 1. API Gateway User
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaUser
metadata:
  name: api-gateway-user
  # Namespace handled by Kustomization
  labels:
    strimzi.io/cluster: main-cluster
spec:
  authentication:
    type: scram-sha-512
  authorization:
    type: simple
    acls:
      - resource:
          type: topic
          name: users.events
          patternType: literal
        operation: Read
        host: "*"

---
# 2. Users Service User
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaUser
metadata:
  name: users-service-user
  labels:
    strimzi.io/cluster: main-cluster
spec:
  authentication:
    type: scram-sha-512
  template:
    secret:
      metadata:
        annotations:
          # اجازه کپی شدن این Secret را صادر می‌کند
          reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
          # فقط اجازه می‌دهد Secret در نیم‌اسپیس اپلیکیشن‌های شما کپی شود
          reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: "mrun-apps"
          # به Reflector می‌گوید خودش Secret را در نیم‌اسپیس مقصد بسازد (Auto-Sync)
          reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
  authorization:
    type: simple
    acls:
      # Split Read and Write operations
      - resource:
          type: topic
          name: users.events
          patternType: literal
        operation: Read
        host: "*"
      - resource:
          type: topic
          name: users.events
          patternType: literal
        operation: Write
        host: "*"
      - resource:
          type: group
          name: users-service-group
          patternType: literal
        operation: Read
        host: "*"

---
