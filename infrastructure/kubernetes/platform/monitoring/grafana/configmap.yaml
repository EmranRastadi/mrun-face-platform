apiVersion: v1
kind: ConfigMap
metadata:
  name: mrun-grafana-datasources
  namespace: mrun-monitoring
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus-operated.monitoring:9090   
        isDefault: true
        editable: false
        jsonData:
          timeInterval: "15s"
          queryTimeout: "30s"
          httpMethod: "POST"
      
      - name: Loki
        type: loki
        access: proxy
        url: http://loki.monitoring:3100
        isDefault: false
        editable: false
        jsonData:
          maxLines: 1000
      
      - name: Tempo
        type: tempo
        access: proxy
        url: http://tempo.monitoring:3200
        isDefault: false
        editable: false
        jsonData:
          tracesToLogs:
            datasourceUid: loki
            tags: ["service.name", "service.namespace"]