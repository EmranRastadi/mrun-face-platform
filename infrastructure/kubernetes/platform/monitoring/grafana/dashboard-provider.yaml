apiVersion: v1
kind: ConfigMap
metadata:
  name: mrun-grafana-dashboard-provider
  namespace: mrun-monitoring
data:
  provider.yaml: |
    apiVersion: 1
    providers:
      - name: "Kubernetes Dashboards"
        orgId: 1
        folder: "Kubernetes"
        type: file
        disableDeletion: false
        editable: true
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards