apiVersion: apps.yaml/v1
kind: Deployment
metadata:
  name: cards-service
  labels:
    app: cards-service
spec:
  replicas: 2

  selector:
    matchLabels:
      app: cards-service

  template:
    metadata:
      labels:
        app: cards-service

    spec:
      serviceAccountName: cards-service

      containers:
        - name: cards-service
          image: mrun/cards-service:latest
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 3000

          envFrom:
            - configMapRef:
                name: cards-service-config

          env:
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cards-service-secret
                  key: DATABASE_PASSWORD

          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20

          resources:
            requests:
              cpu: 100m
              memory: 256Mi

            limits:
              cpu: 500m
              memory: 512Mi