apiVersion: v1
kind: Service

metadata:
  name: api-gateway
  namespace: mrun-apps

  annotations:
    consul.hashicorp.com/service-name: api-gateway
    consul.hashicorp.com/service-port: "80"

spec:
  selector:
    app: api-gateway

  ports:
    - name: http
      port: 80
      targetPort: 3000
      nodePort: 30080

  type: NodePort