apiVersion: apps/v1
kind: Deployment

metadata:
  name: api-gateway
  namespace: mrun-apps
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: mrun-platform
    app.kubernetes.io/component: gateway

spec:
  replicas: 1

  strategy:
    type: RollingUpdate

  selector:
    matchLabels:
      app.kubernetes.io/name: api-gateway

  template:
    metadata:
      labels:
        app.kubernetes.io/name: api-gateway
        app.kubernetes.io/part-of: mrun-platform
        app.kubernetes.io/component: gateway

    spec:
      serviceAccountName: api-gateway
      securityContext:
        fsGroup: 1000

      containers:

        - name: api-gateway

          image: mrun/api-gateway

          imagePullPolicy: IfNotPresent

          ports:

            - containerPort: 3000

          envFrom:

            - configMapRef:
                name: api-gateway-config

            - secretRef:
                name: api-gateway-secret

          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          resources:

            requests:
              cpu: 100m
              memory: 128Mi

            limits:
              cpu: 500m
              memory: 512Mi

