apiVersion: apps/v1
kind: Deployment
metadata:
  name: reflector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reflector
  template:
    metadata:
      labels:
        app: reflector
    spec:
      serviceAccountName: reflector
      containers:
        - name: reflector
          image: emberstack/kubernetes-reflector:7.1.50
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi