apiVersion: v1
kind: ResourceQuota

metadata:
  name: monitoring-resource-quota
  namespace: mrun-monitoring

spec:
  hard:
    requests.cpu: "2"
    requests.memory: 8Gi

    limits.cpu: "4"
    limits.memory: 12Gi

    pods: "20"

    services: "20"

    persistentvolumeclaims: "20"

    configmaps: "50"

    secrets: "50"