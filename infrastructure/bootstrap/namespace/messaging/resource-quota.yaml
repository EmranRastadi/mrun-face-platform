apiVersion: v1
kind: ResourceQuota
metadata:
  name: namespace-quota
  namespace: mrun-messaging
spec:
  hard:
    requests.cpu: "8"
    requests.memory: 16Gi
    limits.cpu: "16"
    limits.memory: 32Gi

    pods: "100"

    services: "20"
    persistentvolumeclaims: "20"

    secrets: "50"
    configmaps: "50"