apiVersion: apps/v1
kind: Deployment

metadata:
  name: api-gateway
  namespace: mrun-apps

spec:
  replicas: 2

  selector:
    matchLabels:
      app: api-gateway

  template:
    metadata:
      labels:
        app: api-gateway

    spec:
      containers:
        - name: api-gateway

          image: mrun/api-gateway:latest

          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 3000

          envFrom:
            - configMapRef:
                name: api-gateway-config

            - secretRef:
                name: api-gateway-secret

          env:
            - name: APP_NAME
              value: api-gateway

            - name: APP_PORT
              value: "3000"

            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP

          readinessProbe:
            httpGet:
              path: /health
              port: 3000

          livenessProbe:
            httpGet:
              path: /health
              port: 3000