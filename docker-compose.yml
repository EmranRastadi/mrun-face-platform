services:
  # ==================== Infrastructure Services ====================
  
  consul:
    image: hashicorp/consul:latest
    container_name: consul
    ports:
      - "8500:8500"   # UI و API
      - "8600:8600/udp" # DNS
    networks:
      - mrun-network
    command: agent -dev -client=0.0.0.0 -ui
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tasks
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mrun-network
    restart: unless-stopped

  # ==================== Application Services ====================

  # اپ اصلی قبلی (Next.js یا React)
  # app:
  #   build: 
  #     context: ./app
  #     dockerfile: Dockerfile
  #   container_name: app
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     DB_HOST: postgres
  #     DB_PORT: 5432
  #     DB_USER: postgres
  #     DB_PASSWORD: postgres
  #     DB_NAME: tasks
  #     CONSUL_HOST: consul
  #     CONSUL_PORT: 8500
  #   depends_on:
  #     - postgres
  #     - consul
  #   networks:
  #     - mrun-network
  #   restart: unless-stopped

  # سرویس جدید کارت‌ها (FastAPI)
  cards-service:
    build: 
      context: ./apps/cards-service
      dockerfile: Dockerfile
    container_name: cards-service
    ports:
      - "8000:8000"
    environment:
      CONSUL_HOST: consul
      CONSUL_PORT: 8500
      DB_HOST: postgres 
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: tasks
    depends_on:
      - postgres
      - consul
    networks:
      - mrun-network
    restart: unless-stopped

  users-service:
    build: 
      context: ./apps/users-service
      dockerfile: Dockerfile
    container_name: mrun-users
    ports:
      - "8001:8000"
    environment:
      SERVICE_NAME: users-service
      SERVICE_VERSION: 1.0.0
      ENVIRONMENT: development
      CONSUL_HOST: consul
      CONSUL_PORT: 8500
      CONSUL_ENABLED: "true"
      LOG_LEVEL: INFO
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: mrun
      JWT_SECRET: secret-key
      JWT_EXPIRES_IN: 7d
    depends_on:
      - consul
      - postgres
    networks:
      - mrun-network
    restart: unless-stopped
    volumes:
      - ./apps/users-service:/app  # برای توسعه
      - /app/node_modules


# ==================== شبکه ====================
networks:
  mrun-network:
    driver: bridge

# ==================== Volume‌ها ====================
volumes:
  postgres_data: